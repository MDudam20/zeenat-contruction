<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery Modal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- BOOTSTRAP CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f5f5;
}

/* GALLERY */
.gallery-section{
  padding:60px 8%;
}

.gallery-title{
  text-align:center;
  font-size:36px;
  font-weight:700;
  margin-bottom:30px;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:22px;
}

.gallery-item{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.5s;
}

.gallery-item:hover img{
  transform:scale(1.1);
}

/* HOVER ICON */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.65);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.4s;
}

.gallery-item:hover .overlay{
  opacity:1;
}

.overlay i{
  font-size:42px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<section class="gallery-section">
<h2 class="gallery-title">Our Gallery</h2>

<div class="gallery-grid">

  <!-- IMAGE -->
  <div class="gallery-item" data-type="image" data-src="images/img1.jpg">
    <img src="images/img1.jpg">
    <div class="overlay" data-bs-toggle="modal" data-bs-target="#galleryModal">
      <i>🔍</i>
    </div>
  </div>

  <div class="gallery-item" data-type="image" data-src="images/img2.jpg">
    <img src="images/img2.jpg">
    <div class="overlay" data-bs-toggle="modal" data-bs-target="#galleryModal">
      <i>🔍</i>
    </div>
  </div>

  <!-- VIDEO -->
  <div class="gallery-item" data-type="video" data-src="videos/video1.mp4">
    <img src="images/img1.jpg">
    <div class="overlay" data-bs-toggle="modal" data-bs-target="#galleryModal">
      <i>▶</i>
    </div>
  </div>

</div>
</section>

<!-- MODAL -->
<div class="modal fade" id="galleryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-dark">

      <div class="modal-header border-0">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <div id="modalContent"></div>
      </div>

      <div class="modal-footer border-0 justify-content-between">
        <button class="btn btn-outline-light" id="prevBtn">❮ Prev</button>
        <button class="btn btn-outline-light" id="nextBtn">Next ❯</button>
      </div>

    </div>
  </div>
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const items = document.querySelectorAll('.gallery-item');
const modalContent = document.getElementById('modalContent');
let currentIndex = 0;

/* OPEN MODAL */
items.forEach((item,index)=>{
  item.querySelector('.overlay').onclick=()=>{
    currentIndex=index;
    loadContent();
  }
});

function loadContent(){
  modalContent.innerHTML='';
  const item=items[currentIndex];
  const type=item.dataset.type;
  const src=item.dataset.src;

  if(type==='image'){
    const img=document.createElement('img');
    img.src=src;
    img.className='img-fluid rounded';
    modalContent.appendChild(img);
  }else{
    const video=document.createElement('video');
    video.src=src;
    video.controls=true;
    video.autoplay=true;
    video.className='w-100 rounded';
    modalContent.appendChild(video);
  }
}

/* NAVIGATION */
document.getElementById('nextBtn').onclick=()=>{
  currentIndex=(currentIndex+1)%items.length;
  loadContent();
};

document.getElementById('prevBtn').onclick=()=>{
  currentIndex=(currentIndex-1+items.length)%items.length;
  loadContent();
};

/* STOP VIDEO ON CLOSE */
document.getElementById('galleryModal').addEventListener('hidden.bs.modal',()=>{
  modalContent.innerHTML='';
});
</script>

</body>
</html>
